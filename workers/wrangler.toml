name = "halal-directory-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "halal-directory"
database_id = "6b8e0660-9ef2-48d1-aaf9-2ea87bbfb793"
migrations_dir = "migrations"

[vars]
# Non-secret vars go here. Secrets are set via `wrangler secret put`.
#
# Required secrets (run once per environment):
#   wrangler secret put ADMIN_SESSION_SECRET
#   wrangler secret put CLOUDINARY_CLOUD_NAME
#   wrangler secret put CLOUDINARY_API_KEY
#   wrangler secret put CLOUDINARY_API_SECRET

[dev]
port = 8787
local_protocol = "http"
